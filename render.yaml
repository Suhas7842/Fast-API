services:
  - type: web
    name: fastapi-blog-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn blog.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: DATABASE_URL
        fromDatabase:
          name: fastapi-blog-db
          property: connectionString

databases:
  - name: fastapi-blog-db
    plan: free
